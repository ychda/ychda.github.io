name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 必须权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6  # 最新版
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 官方 GitHub Pages 部署（无 Node 20 警告）
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist  # 你打包输出的目录（dist / build / public 等）

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
